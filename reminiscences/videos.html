<!DOCTYPE html>
<html>
<head>
    <title>Video Archive</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="sidebar">

    <a href="/index.html">Home</a>

    <div class="menu-group">
        <input type="checkbox" id="mus-toggle">
        <label for="mus-toggle" class="menu-toggle">Musings</label>

        <div class="submenu">
            <a href="../musings/life.html">General</a>
            <a href="../musings/work.html">Technical</a>
        </div>
    </div>

    <div class="menu-group">
        <input type="checkbox" id="rem-toggle">
        <label for="rem-toggle" class="menu-toggle">Reminiscences</label>

        <div class="submenu">
            <a href="/reminiscences/videos.html">Videos</a>
            <a href="/reminiscences/photos.html">Photos</a>
            <a href="/reminiscences/audios.html">Audios</a>
        </div>
    </div>

</div>

<div class="content">

    <h1>Video Archive</h1>

    <div class="video-grid">

        <a href="video/RatDance.mp4" target="_blank" class="video-card">
            <div class="video-thumb-wrapper">
                <video class="video-thumb" src="video/RatDance.mp4" preload="metadata" muted></video>
                <div class="play-icon">&#9654;</div>
            </div>
            <span class="video-caption">Rathika on Covid</span>
        </a>

        <a href="video/Rat.10.5.22.mp4" target="_blank" class="video-card">
            <div class="video-thumb-wrapper">
                <video class="video-thumb" src="video/Rat.10.5.22.mp4" preload="metadata" muted></video>
                <div class="play-icon">&#9654;</div>
            </div>
            <span class="video-caption">Rathika B'day</span>
        </a>

        <a href="video/myBday.mp4" target="_blank" class="video-card">
            <div class="video-thumb-wrapper">
                <video class="video-thumb" src="video/myBday.mp4" preload="metadata" muted></video>
                <div class="play-icon">&#9654;</div>
            </div>
            <span class="video-caption">My B'day</span>
        </a>

        <a href="video/seemaBD.mp4" target="_blank" class="video-card">
            <div class="video-thumb-wrapper">
                <video class="video-thumb" src="video/seemaBD.mp4" preload="metadata" muted></video>
                <div class="play-icon">&#9654;</div>
            </div>
            <span class="video-caption">Seema B'day</span>
        </a>

        <a href="video/parents.mp4" target="_blank" class="video-card">
            <div class="video-thumb-wrapper">
                <video class="video-thumb" src="video/parents.mp4" preload="metadata" muted></video>
                <div class="play-icon">&#9654;</div>
            </div>
            <span class="video-caption">Card Game On!</span>
        </a>

    </div>

</div>

<script>
    // Seek each video to 1 second to capture a meaningful thumbnail frame
    document.querySelectorAll('.video-thumb').forEach(function(video) {
        video.addEventListener('loadedmetadata', function() {
            video.currentTime = 1;
        });
    });
</script>

</body>
</html>
